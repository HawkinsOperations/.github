<svg xmlns="http://www.w3.org/2000/svg" width="640" height="180" viewBox="0 0 640 180" role="img" aria-labelledby="title desc">
  <title id="title">Claim firewall</title>
  <desc id="desc">A claim firewall separating rendering from proof authority.</desc>
  <rect width="640" height="180" rx="16" fill="#080b10"/>
  <rect x="20" y="20" width="600" height="140" rx="12" fill="#0d131b" stroke="#314050"/>
  <path d="M314 34 V146" stroke="#8fd8ff" stroke-width="2"/>
  <path d="M286 50 H342 M286 74 H342 M286 98 H342 M286 122 H342" stroke="#526577" stroke-width="1.4"/>
  <text x="60" y="62" fill="#d8dee8" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Rendering</text>
  <text x="60" y="92" fill="#aeb9c6" font-family="Segoe UI, Arial, sans-serif" font-size="15">GitHub and website surfaces</text>
  <text x="60" y="119" fill="#aeb9c6" font-family="Segoe UI, Arial, sans-serif" font-size="15">route reviewers only</text>
  <text x="372" y="62" fill="#d8dee8" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Proof Authority</text>
  <text x="372" y="92" fill="#aeb9c6" font-family="Segoe UI, Arial, sans-serif" font-size="15">records, validation, CI,</text>
  <text x="372" y="119" fill="#aeb9c6" font-family="Segoe UI, Arial, sans-serif" font-size="15">promotion gates</text>
</svg>
