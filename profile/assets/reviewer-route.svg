  </g>
  <g stroke="#8fd8ff" stroke-width="1.6" stroke-linecap="round" fill="none">
    <path d="M176 89 H212"/>
    <path d="M340 89 H376"/>
    <path d="M504 89 H540"/>
    <path d="M668 89 H704"/>
    <path d="M203 82 L212 89 L203 96"/>
    <path d="M367 82 L376 89 L367 96"/>
    <path d="M531 82 L540 89 L531 96"/>
    <path d="M695 82 L704 89 L695 96"/>
  </g>
  <text x="48" y="40" fill="#8fd8ff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">3-MINUTE REVIEWER ROUTE</text>
  <text x="48" y="144" fill="#aeb9c6" font-family="Segoe UI, Arial, sans-serif" font-size="14">Start public, verify through records, then inspect source and authority boundaries.</text>
