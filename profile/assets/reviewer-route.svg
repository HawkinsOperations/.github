<svg xmlns="http://www.w3.org/2000/svg" width="900" height="190" viewBox="0 0 900 190" role="img" aria-labelledby="title desc">
  <title id="title">Reviewer route</title>
  <desc id="desc">A five-step reviewer route from website to source logic.</desc>
  <rect width="900" height="190" rx="16" fill="#080b10"/>
  <rect x="18" y="18" width="864" height="154" rx="12" fill="#0d131b" stroke="#314050"/>
  <g fill="#0f1721" stroke="#6f7d8d" stroke-width="1.2">
    <rect x="48" y="60" width="128" height="58" rx="8"/>
    <rect x="212" y="60" width="128" height="58" rx="8"/>
    <rect x="376" y="60" width="128" height="58" rx="8"/>
    <rect x="540" y="60" width="128" height="58" rx="8"/>
    <rect x="704" y="60" width="128" height="58" rx="8"/>
  </g>
  <g fill="#d8dee8" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    <text x="112" y="94" text-anchor="middle">Website</text>
    <text x="276" y="94" text-anchor="middle">Proof</text>
    <text x="440" y="94" text-anchor="middle">Validation</text>
    <text x="604" y="94" text-anchor="middle">Detections</text>
